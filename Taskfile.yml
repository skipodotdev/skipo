version: '3'

# lich is a pure-Go binary (no CGO) serving its embedded frontend to a system
# Chromium --app window — see docs/chromium-shell.md. Linux first; an
# experimental Windows build cross-compiles via build:windows.

vars:
  APP_NAME: "lich"
  BIN_DIR: "bin"
  VITE_PORT: '{{.LICH_VITE_PORT | default 9245}}'
  # Package version follows the git tag (env VERSION overrides) — no manual bump.
  VERSION:
    sh: echo "${VERSION:-$(git describe --tags --always 2>/dev/null | sed 's/^v//')}"
  GO_BUILD_FLAGS: '-trimpath -ldflags "-s -w"'

tasks:
  build:frontend:
    summary: Installs frontend deps and builds frontend/dist (embedded by Go)
    cmds:
      - cmd: cd frontend && pnpm install --frozen-lockfile && pnpm run build

  build:
    summary: Builds the static lich binary
    deps: [build:frontend]
    cmds:
      - cmd: CGO_ENABLED=0 go build {{.GO_BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}} .

  build:windows:
    summary: Cross-compiles the Windows binary (experimental)
    deps: [build:frontend]
    cmds:
      # GUI subsystem: no console window rides along. stdout/stderr go
      # nowhere — the persistent lich.log is the diagnostic surface.
      - cmd: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -H=windowsgui" -o {{.BIN_DIR}}/{{.APP_NAME}}.exe .

  build:mac:
    summary: Cross-compiles the macOS binaries — arm64 + amd64 (experimental)
    deps: [build:frontend]
    cmds:
      # Both arches: Apple Silicon (arm64) and Intel (amd64). Pure Go, so both
      # cross-compile from any host. Unsigned — Gatekeeper quarantines until
      # notarization ships (see CLAUDE.md Known Ceilings).
      - cmd: CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build {{.GO_BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}-darwin-arm64 .
      - cmd: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build {{.GO_BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}-darwin-amd64 .

  run:
    summary: Builds and runs the application
    deps: [build]
    cmds:
      - cmd: ./{{.BIN_DIR}}/{{.APP_NAME}}

  dev:
    summary: Development mode — Vite HMR + backend, window pointed at the dev server
    cmds:
      # frontend/dist must exist for go:embed to compile, even though the
      # window loads the Vite server; build it once, then serve with HMR.
      # Dev isolation: separate DB (LICH_DEV, store.databasePath), separate
      # listener port and Chromium profile (LICH_DEV_URL side effect), so a
      # daily-driver lich keeps running untouched.
      - cmd: |
          set -e
          (cd frontend && pnpm install --frozen-lockfile && pnpm run build)
          (cd frontend && pnpm run dev) &
          VITE_PID=$!
          # Task's embedded shell (mvdan/sh) only knows the EXIT trap; Ctrl+C
          # reaches the whole process group (Vite included) on its own.
          trap 'kill $VITE_PID 2>/dev/null || true' EXIT
          sleep 1.5
          LICH_DEV=1 LICH_DEV_URL="http://127.0.0.1:{{.VITE_PORT}}" LICH_LISTEN_PORT=47822 go run .

  test:
    summary: Backend and frontend suites
    cmds:
      - cmd: go test ./...
      - cmd: cd frontend && pnpm test

  mutation:
    summary: 'Mutation tests via gremlins (config: .gremlins.yaml). Scope with -- ./pkg/'
    preconditions:
      - sh: command -v gremlins
        msg: "gremlins is required: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest"
    cmds:
      # No path → whole module (slow: single-worker, terminal spawns real PTYs).
      # Scope a run with: task mutation -- ./internal/store/
      - cmd: gremlins unleash {{.CLI_ARGS}}

  package:
    summary: Builds the Linux packages (deb, rpm, archlinux) into bin/
    deps: [build]
    cmds:
      - task: package:nfpm
        vars: { FORMAT: deb, TARGET: '{{.APP_NAME}}.deb' }
      - task: package:nfpm
        vars: { FORMAT: rpm, TARGET: '{{.APP_NAME}}.rpm' }
      - task: package:nfpm
        vars: { FORMAT: archlinux, TARGET: '{{.APP_NAME}}.pkg.tar.zst' }

  package:windows:
    summary: Builds the Windows installer (lich-setup.exe) — needs Inno Setup 6
    deps: [build:windows]
    preconditions:
      - sh: command -v iscc
        msg: "iscc (Inno Setup 6) is required — on Windows: choco install innosetup"
    env:
      VERSION: '{{.VERSION}}'
    cmds:
      - cmd: iscc build/windows/lich.iss

  package:nfpm:
    internal: true
    preconditions:
      - sh: command -v nfpm
        msg: "nfpm is required: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest"
    env:
      VERSION: '{{.VERSION}}'
      GOARCH: amd64
    cmds:
      - cmd: nfpm package -f build/linux/nfpm/nfpm.yaml -p {{.FORMAT}} -t {{.BIN_DIR}}/{{.TARGET}}
