# nfpm config for the lich packages (deb, rpm, archlinux) — invoked directly
# by the root Taskfile (`task package`). The binary is static pure Go; the
# only runtime needs are a Chromium-family browser and zenity, both soft
# (recommends where the format supports it) so installs never block.

name: "lich"
arch: ${GOARCH}
platform: "linux"
# Follows the git tag via $VERSION (injected by the Taskfile) — no manual bump.
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "omartelo <meopedevts@proton.me>"
description: "A personal harness for AI-assisted development"
vendor: "lich"
homepage: "https://github.com/omartelo/lich"
license: "AGPL-3.0-only"

contents:
  - src: "./bin/lich"
    dst: "/usr/local/bin/lich"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/lich.png"
  - src: "./build/linux/lich.desktop"
    dst: "/usr/share/applications/lich.desktop"

recommends:
  - chromium
  - zenity

overrides:
  deb:
    recommends:
      - chromium | chromium-browser | google-chrome-stable
      - zenity

scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
